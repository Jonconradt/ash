name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run quality checks
        run: make lint test

      - name: Build installer artifacts
        run: make release RELEASE_VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/*.pkg
            dist/release/*.pkg.sha256
